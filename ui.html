<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose Model to ESP32</title>
    <style>
        /* สไตล์ Minimalist */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 10px;
            color: #374151;
        }

        /* สถานะ MQTT */
        #mqtt-status {
            font-size: 0.85rem;
            color: #d97706; /* สีส้มตอนกำลังเชื่อมต่อ */
            margin-bottom: 20px;
            font-weight: 500;
        }
        .connected {
            color: #059669 !important; /* เปลี่ยนเป็นสีเขียวเมื่อเชื่อมต่อสำเร็จ */
        }

        button {
            background-color: #111827;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 24px;
        }

        button:hover {
            background-color: #374151;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            background-color: #f3f4f6;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        #label-container div {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #4b5563;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pose Model to ESP32</h1>
        <div id="mqtt-status">Connecting to MQTT... ⏳</div>
        <button type="button" onclick="init()">Start Camera</button>
        <div><canvas id="canvas" width="200" height="200"></canvas></div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

    <script type="text/javascript">
        // ลิงก์โมเดลของคุณ
        const URL = "https://teachablemachine.withgoogle.com/models/fJNEv-7Gx/";
        let model, webcam, ctx, labelContainer, maxPredictions;
        
        // ---------------- MQTT SETUP ----------------
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt'); 
        const mqttTopic = "test/control";
        
        let lastSentMessage = ""; 
        let currentPose = "";      
        let poseStartTime = 0;     
        const HOLD_TIME_MS = 2000; // ค้างไว้ 2 วินาที

        // เมื่อเชื่อมต่อ MQTT สำเร็จ ให้เปลี่ยนข้อความหน้าเว็บ
        mqttClient.on('connect', function () {
            console.log("Connected to MQTT broker!");
            const statusEl = document.getElementById("mqtt-status");
            statusEl.innerText = "MQTT Connected ✅";
            statusEl.classList.add("connected");
        });
        // --------------------------------------------

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const size = 200;
            const flip = false; // 🟢 ปรับเป็น false เพื่อไม่ให้กล้องสลับซ้าย-ขวา
            webcam = new tmPose.Webcam(size, size, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            const canvas = document.getElementById("canvas");
            canvas.width = size; canvas.height = size;
            ctx = canvas.getContext("2d");
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = '';
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop(timestamp) {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let highestProb = 0;
            let bestPose = "";

            // หาความแม่นยำและอัปเดตหน้าเว็บ
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + " : " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;

                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestPose = prediction[i].className;
                }
            }

            // 🟢 ตรวจสอบว่าทำท่าชัดเจนไหม (>= 90%)
            if (highestProb >= 0.90) {
                if (bestPose !== currentPose) {
                    currentPose = bestPose;
                    poseStartTime = Date.now(); 
                } 
                else {
                    let elapsedTime = Date.now() - poseStartTime;
                    
                    // ถ้าค้างครบ 2 วินาที และยังไม่ได้ส่งคำสั่งนี้ไปล่าสุด
                    if (elapsedTime >= HOLD_TIME_MS && bestPose !== lastSentMessage) {
                        let upperCasePose = bestPose.toUpperCase().trim(); 
                        console.log("✅ ส่งข้อมูล MQTT:", upperCasePose);
                        mqttClient.publish(mqttTopic, upperCasePose);
                        lastSentMessage = bestPose; 
                    }
                }
            } else {
                currentPose = "";
                poseStartTime = 0;
            }

            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>
</html>
